name: Bundle Size (main baseline)
on:
  push:
    branches: [main]
    paths:
      - "packages/*/src/**"
      - "packages/*/package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Check bundle size
        run: npx tsx scripts/check-bundle-size.ts

      - name: Generate octocov custom metrics
        run: |
          metrics=$(npx tsx scripts/check-bundle-size.ts --json)
          echo "OCTOCOV_CUSTOM_METRICS_BUNDLE_SIZE=${metrics}" >> "$GITHUB_ENV"

      - uses: k1LoW/octocov-action@v1
