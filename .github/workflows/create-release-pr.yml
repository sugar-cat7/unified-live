name: Create Release PR

on:
  push:
    branches:
      - develop
    paths-ignore:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for existing release PR
          EXISTING_PR=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "Release PR #${EXISTING_PR} already exists"
          else
            # Create new PR
            gh pr create \
              --base main \
              --head develop \
              --title "Release: develop -> main" \
              --body "## Release PR

          This PR merges \`develop\` into \`main\`.

          ---
          Generated automatically by GitHub Actions."
          fi
