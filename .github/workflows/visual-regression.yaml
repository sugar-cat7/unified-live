name: Visual Regression Tests

on:
  workflow_dispatch:
    inputs:
      update_baseline:
        description: 'Update baseline'
        type: boolean
        default: true
  push:
    branches: [develop, main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @my-app/errors build
          pnpm --filter @my-app/dayjs build

      - name: Build Storybook
        run: pnpm --filter web storybook:build

      # For PRs: download the baseline from the develop branch
      - name: Download baseline
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: visual-regression.yaml
          branch: develop
          name: vrt-baseline
          path: services/web/vrt/snapshots
          if_no_artifact_found: warn

      - name: Run VRT
        id: vrt
        run: |
          cd services/web
          docker compose -f vrt/docker-compose.yml run --rm vrt
        continue-on-error: true

      # For develop or workflow_dispatch: upload the baseline
      - name: Upload baseline
        if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && inputs.update_baseline)
        uses: actions/upload-artifact@v4
        with:
          name: vrt-baseline
          path: services/web/vrt/snapshots
          retention-days: 90

      # Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-results-${{ github.sha }}
          path: services/web/vrt/test-results
          retention-days: 30

      # Comment on PR
      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.vrt.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 📸 Visual Regression Test - Differences Detected

            Changes were found in the Storybook component screenshots.

            **[View test results](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})**

            If these changes are intentional, the baseline will be updated after merging into develop.`
            });

      - name: Check VRT result
        if: steps.vrt.outcome == 'failure'
        run: exit 1
