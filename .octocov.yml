# octocov configuration
# https://github.com/k1LoW/octocov

coverage:
  paths:
    - services/api/coverage/coverage-final.json

codeToTestRatio:
  code:
    - services/api/domain/**/*.ts
    - services/api/pkg/**/*.ts
    - services/api/usecase/**/*.ts
    - services/api/infra/**/*.ts
    - "!**/*.test.ts"
  test:
    - services/api/**/*.test.ts

comment:
  enable: true
  hideFooterLink: false

summary:
  enable: true
