<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo mark -->
  <path d="M160 280 L240 400 L320 280" fill="none" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="160" cy="280" r="10" fill="#f472b6"/>
  <circle cx="320" cy="280" r="10" fill="#34d399"/>
  <circle cx="240" cy="400" r="10" fill="#38bdf8"/>
  <!-- Title -->
  <text x="400" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="700" fill="#f8fafc">unified-live</text>
  <!-- Subtitle -->
  <text x="400" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#94a3b8">Unified TypeScript SDK for Live Streaming APIs</text>
  <!-- Platform badges -->
  <text x="400" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#64748b">YouTube  |  Twitch  |  TwitCasting</text>
  <!-- Zero deps badge -->
  <rect x="400" y="470" width="200" height="36" rx="18" fill="#1e3a5f"/>
  <text x="500" y="494" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle">Zero Dependencies</text>
</svg>
