services:
  # Unit tests (no database required)
  test-unit:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      target: test
    network_mode: host
    environment:
      NODE_ENV: test
    volumes:
      - ./packages:/app/packages:delegated
      - ./services:/app/services:delegated
      # Preserve container's node_modules (prevent host override)
      - /app/node_modules
      - /app/packages/errors/node_modules
      - /app/packages/dayjs/node_modules
      - /app/packages/logger/node_modules
      - /app/services/api/node_modules
      - /app/services/web/node_modules
    working_dir: /app
    command: >
      sh -c "
        pnpm --filter api test:run &&
        pnpm --filter @my-app/errors test:run &&
        pnpm --filter @my-app/logger test:run
      "

  # Integration tests (TiDB must be running on host)
  test-integration:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      target: test
    network_mode: host
    environment:
      DATABASE_URL: mysql://root@127.0.0.1:4000/test
      CI: "true"
      NODE_ENV: test
    volumes:
      - ./packages:/app/packages:delegated
      - ./services:/app/services:delegated
      - ./scripts:/app/scripts:delegated
      # Preserve container's node_modules (prevent host override)
      - /app/node_modules
      - /app/packages/errors/node_modules
      - /app/packages/dayjs/node_modules
      - /app/packages/logger/node_modules
      - /app/services/api/node_modules
      - /app/services/web/node_modules
    working_dir: /app
    command: pnpm --filter api test:integration

  # Run all tests
  test-all:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      target: test
    network_mode: host
    environment:
      DATABASE_URL: mysql://root@127.0.0.1:4000/test
      CI: "true"
      NODE_ENV: test
    volumes:
      - ./packages:/app/packages:delegated
      - ./services:/app/services:delegated
      - ./scripts:/app/scripts:delegated
      - ./services/api/coverage:/app/services/api/coverage
      # Preserve container's node_modules (prevent host override)
      - /app/node_modules
      - /app/packages/errors/node_modules
      - /app/packages/dayjs/node_modules
      - /app/packages/logger/node_modules
      - /app/services/api/node_modules
      - /app/services/web/node_modules
    working_dir: /app
    command: >
      sh -c "
        pnpm --filter api test:run &&
        pnpm --filter @my-app/errors test:run &&
        pnpm --filter @my-app/logger test:run &&
        pnpm --filter api test:integration
      "

  # Tests with coverage
  test-coverage:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      target: test
    network_mode: host
    environment:
      DATABASE_URL: mysql://root@127.0.0.1:4000/test
      NODE_ENV: test
    volumes:
      - ./packages:/app/packages:delegated
      - ./services:/app/services:delegated
      - ./services/api/coverage:/app/services/api/coverage
      # Preserve container's node_modules (prevent host override)
      - /app/node_modules
      - /app/packages/errors/node_modules
      - /app/packages/dayjs/node_modules
      - /app/packages/logger/node_modules
      - /app/services/api/node_modules
      - /app/services/web/node_modules
    working_dir: /app
    # Pre-clean coverage directory to avoid EBUSY race condition with volume mounts
    command: sh -c "rm -rf /app/services/api/coverage/* 2>/dev/null || true && pnpm --filter api test:coverage"
