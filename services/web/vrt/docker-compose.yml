services:
  vrt:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Storybook static files (read-only)
      - ../storybook-static:/app/storybook-static:ro
      # VRT test files
      - .:/app/vrt
      # Snapshots (writable)
      - ./snapshots:/app/vrt/snapshots
      # Test results
      - ./test-results:/app/vrt/test-results
      # node_modules (dependencies like @playwright/test)
      - ../node_modules:/app/node_modules:ro
